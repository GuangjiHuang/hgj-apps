# 输入指示器 (IME Indicator) 配置文件
[poll]
state_interval_ms = 10   # 状态检测间隔 (ms), default: 100
track_interval_ms = 10    # 位置追踪间隔 (ms)

[tray]
enable = true               # 是否显示托盘图标 (false 时完全后台运行，只能通过任务管理器结束)

[caret]
enable = true               # 是否启用文本光标提示
color_cn = "#ff0000ff"    # 中文状态颜色 (#RRGGBBAA)
color_en = "#00ff00ff"     英文状态颜色
size = 10                    # 提示球大小, default: 8
offset_x = 0
offset_y = 0
show_en = false              # 英文状态下是否显示

[mouse]
enable = false               # 是否开启鼠标提示
color_cn = "#ff0000ff"    # 中文状态颜色
color_en = "#ffff00ff"    # 英文状态颜色
size = 20                    # 提示球大小
offset_x = 8
offset_y = 8
show_en = true              # 英文状态下是否显示
target_cursors = [32513, 32512]  # I-Beam, Normal
